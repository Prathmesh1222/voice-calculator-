<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>Voice Calculator — Speak & Solve</title>
    <meta name="description" content="A next-gen voice-powered calculator that solves math, plots graphs, and does calculus using natural language.">
    <link rel="stylesheet" href="{{ url_for('static', filename='style.css') }}">
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.0/css/all.min.css">
    <link rel="manifest" href="{{ url_for('static', filename='manifest.json') }}">
    <meta name="theme-color" content="#6366f1">
    <!-- KaTeX for math rendering -->
    <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/katex@0.16.9/dist/katex.min.css">
    <script defer src="https://cdn.jsdelivr.net/npm/katex@0.16.9/dist/katex.min.js"></script>
    <script defer src="https://cdn.jsdelivr.net/npm/katex@0.16.9/dist/contrib/auto-render.min.js"></script>
</head>
<body>
    <div class="container">
        <header>
            <h1><i class="fas fa-calculator"></i> Voice Calculator</h1>
            <p>Speak naturally, calculate instantly.</p>
            <nav class="tabs-nav">
                <button class="tab-btn active" data-tab="chat-pane"><i class="fas fa-message"></i> Chat</button>
                <button class="tab-btn" data-tab="graph-pane"><i class="fas fa-chart-line"></i> Graphing</button>
                <a href="/about" class="nav-link"><i class="fas fa-info-circle"></i> About</a>
            </nav>
        </header>

        <main>
            <!-- Chat Pane -->
            <div id="chat-pane" class="tab-pane active">
                <div class="examples-panel" id="examplesPanel">
                    <p class="examples-title"><i class="fas fa-lightbulb"></i> Try these:</p>
                    <div class="examples-grid" id="examplesGrid"></div>
                </div>

                <div class="chat-area" id="chatArea">
                    <div class="chat-welcome">
                        <i class="fas fa-robot"></i>
                        <p>Hi! I'm your voice calculator. Ask me anything!</p>
                    </div>
                </div>
            </div>

            <!-- Graph Pane -->
            <div id="graph-pane" class="tab-pane">
                <div class="graph-modes">
                    <button class="mode-btn active" data-mode="2D">2D Plot</button>
                    <button class="mode-btn" data-mode="3D">3D Surface</button>
                </div>

                <div class="graph-display-panel glass">
                    <div id="activeGraphContainer" class="active-graph-area">
                        <div class="graph-placeholder">
                            <i class="fas fa-chart-area"></i>
                            <p>No graph plotted yet.<br>Switch to 2D/3D and speak an equation!</p>
                        </div>
                    </div>
                </div>
            </div>

            <!-- Loading Spinner -->
            <div class="loader-wrapper" id="loader" style="display:none;">
                <div class="spinner"></div>
                <span>Processing...</span>
            </div>

            <!-- Controls -->
            <div class="controls">
                <div class="text-input-wrapper">
                    <input type="text" id="textInput" placeholder="Type a command..." autocomplete="off">
                    <button id="sendBtn" class="send-button" title="Send"><i class="fas fa-paper-plane"></i></button>
                </div>
                <div class="action-buttons">
                    <div class="secondary-actions">
                        <input type="file" id="imageInput" accept="image/*" hidden>
                        <button id="uploadBtn" class="action-btn" title="Upload Image">
                            <i class="fas fa-camera"></i>
                        </button>
                        <button id="exportBtn" class="action-btn" title="Export History">
                            <i class="fas fa-download"></i>
                        </button>
                    </div>

                    <button id="micBtn" class="mic-button" title="Speak">
                        <i class="fas fa-microphone"></i>
                    </button>

                    <div class="lang-wrapper">
                        <select id="langSelect" class="lang-select" title="Language">
                            <option value="en-US">🇬🇧 EN</option>
                            <option value="hi-IN">🇮🇳 HI</option>
                            <option value="mr-IN">🇮🇳 MR</option>
                            <option value="es-ES">🇪🇸 ES</option>
                        </select>
                    </div>
                </div>
            </div>

            <div class="status-bar" id="statusBar">Ready</div>
        </main>
    </div>

    <script src="{{ url_for('static', filename='script.js') }}"></script>
</body>
</html>
